version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bd_proyecto
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_proyecto
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # Cumple con Persistencia de Datos
    networks:
      - red_interna

  ventas-api:
    build: 
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: api_ventas
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - red_interna

  despachos-api:
    build: 
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: api_despachos
    ports:
      - "8081:8080" # Se expone en el 8081 para no chocar con ventas
    depends_on:
      - db
    networks:
      - red_interna

  frontend:
    build:
      context: ./front_despacho
    container_name: front_app
    ports:
      - "80:80"
    depends_on:
      - ventas-api
      - despachos-api
    networks:
      - red_interna

volumes:
  db_data:

networks:
  red_interna:
    driver: bridge