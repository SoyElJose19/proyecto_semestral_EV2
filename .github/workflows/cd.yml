name: Despliegue continuo (CD)

on:
  pull_request:
    branches: [ develop ]
  push:
    branches:
      - develop

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_PREFIX: proyecto-semestral        
  ECS_SERVICE_DESPACHOS: proyecto-semestral-backend-despachos-service
  ECS_SERVICE_VENTAS: proyecto-semestral-backend-ventas-service
  ECS_SERVICE_FRONTEND: proyecto-semestral-frontend-service
  ECS_CLUSTER: proyecto-semestral-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend-despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-back-despachos:latest
          platforms: linux/amd64

      - name: Build & Push backend-ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-back-ventas:latest
          platforms: linux/amd64

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-frontend:latest
          platforms: linux/amd64

      - name: Actualizar servicio Despachos
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_DESPACHOS }} --force-new-deployment

      - name: Actualizar servicio Ventas
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_VENTAS }} --force-new-deployment

      - name: Actualizar servicio Frontend
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_FRONTEND }} --force-new-deployment