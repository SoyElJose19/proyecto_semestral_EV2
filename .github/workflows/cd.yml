name: Despliegue en AWS con EKS (CD)

on:
  push:
    branches:
      - deploy
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: devops3-cluster
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # MANTENEMOS JDK 17 (Para evitar el error de Lombok que ya arreglamos)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # RUTAS CORREGIDAS
      - name: Build Ventas Jar
        run: |
          cd backend/back-Ventas_SpringBoot
          mvn clean package -DskipTests

      - name: Build Despachos Jar
        run: |
          cd backend/back-Despachos_SpringBoot
          mvn clean package -DskipTests

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Loguear con ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Rescatar el AWS Account ID
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Definir las URL de los ECR
        run: |
          echo "BACKEND_DESPACHOS_ECR=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/backend-despachos" >> $GITHUB_ENV
          echo "BACKEND_VENTAS_ECR=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/backend-ventas" >> $GITHUB_ENV
          echo "FRONTEND_ECR=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/frontend-despacho" >> $GITHUB_ENV

      - name: Build & Push Backend Despachos
        run: |
          cd backend/back-Despachos_SpringBoot
          docker build -t $BACKEND_DESPACHOS_ECR:${{ github.sha }} .
          docker push $BACKEND_DESPACHOS_ECR:${{ github.sha }}
          docker tag $BACKEND_DESPACHOS_ECR:${{ github.sha }} $BACKEND_DESPACHOS_ECR:latest
          docker push $BACKEND_DESPACHOS_ECR:latest

      - name: Build & Push Backend Ventas
        run: |
          cd backend/back-Ventas_SpringBoot
          docker build -t $BACKEND_VENTAS_ECR:${{ github.sha }} .
          docker push $BACKEND_VENTAS_ECR:${{ github.sha }}
          docker tag $BACKEND_VENTAS_ECR:${{ github.sha }} $BACKEND_VENTAS_ECR:latest
          docker push $BACKEND_VENTAS_ECR:latest

      - name: Build & Push Frontend
        run: |
          cd front_despacho
          docker build -t $FRONTEND_ECR:${{ github.sha }} .
          docker push $FRONTEND_ECR:${{ github.sha }}
          docker tag $FRONTEND_ECR:${{ github.sha }} $FRONTEND_ECR:latest
          docker push $FRONTEND_ECR:latest

      # EL ESCANEO DE SEGURIDAD (Requisito EFT)
      - name: Escaneo de Vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.BACKEND_DESPACHOS_ECR }}:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Configurar Kubeconfig para EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}
          
      - name: Crear o actualizar ConfigMap MySQL
        run: |
          kubectl create configmap mysql-init-config --from-file=./mysql-init/init.sql -o yaml --dry-run=client | kubectl apply -f -
          
      - name: Instalar Metrics Server (Para HPA)
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          
      - name: Crear Secreto de Base de Datos
        run: |
          kubectl create secret generic db-credenciales \
            --from-literal=username=${{ secrets.DB_USER }} \
            --from-literal=password=${{ secrets.DB_PASS }} \
            --dry-run=client -o yaml | kubectl apply -f -
            
      - name: Aplicar manifiestos
        run: |
          kubectl apply -f infra/k8s/
          
      - name: Actualizar imágenes en el Clúster
        run: |
          kubectl set image deployment/backend-despacho backend-despacho=$BACKEND_DESPACHOS_ECR:${{ github.sha }}
          kubectl set image deployment/backend-ventas backend-ventas=$BACKEND_VENTAS_ECR:${{ github.sha }}
          kubectl set image deployment/frontend-despacho frontend-despacho=$FRONTEND_ECR:${{ github.sha }}
      
      - name: Esperar despliegues
        run: |
          kubectl rollout status deployment/backend-despacho --timeout=5m
          kubectl rollout status deployment/backend-ventas --timeout=5m
          kubectl rollout status deployment/frontend-despacho --timeout=5m

      - name: Diagnóstico de Pods (Si falla)
        if: failure()
        run: |
          echo "=== ESTADO DE LOS PODS ==="
          kubectl get pods
          
      - name: Mostrar resumen final
        run: |
          echo "=========================================="
          echo " DESPLIEGUE COMPLETADO EXITOSAMENTE"
          echo "=========================================="
          kubectl get pods
          kubectl get svc
          kubectl get hpa