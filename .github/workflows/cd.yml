name: CD - Despliegue Continuo

on:
  push:
    branches: [ deploy ]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: proyecto-semestral-cluster
  ECS_SERVICE_DESPACHOS: proyecto-semestral-backend-despachos-service
  ECS_SERVICE_VENTAS: proyecto-semestral-backend-ventas-service
  ECS_SERVICE_FRONTEND: proyecto-semestral-frontend-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar credenciales AWS (¡Con AWS_SESSION_TOKEN para AWS Academy!)
      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login a ECR
      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build & Push Backend Despachos
      - name: Build & Push Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/proyecto-semestral-backend-despachos:latest
          platforms: linux/amd64

      # 5. Build & Push Backend Ventas
      - name: Build & Push Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/proyecto-semestral-backend-ventas:latest
          platforms: linux/amd64

      # 6. Build & Push Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/proyecto-semestral-frontend:latest
          platforms: linux/amd64

      # 7. Forzar nuevo despliegue en ECS
      - name: Actualizar servicio Backend Despachos
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_DESPACHOS }} --force-new-deployment

      - name: Actualizar servicio Backend Ventas
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_VENTAS }} --force-new-deployment

      - name: Actualizar servicio Frontend
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_FRONTEND }} --force-new-deployment