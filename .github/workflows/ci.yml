name: CI - Integración Continua

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop, feature/*]

jobs:
  backend-checks:
    strategy:
      matrix:
        microservice: [back-Despachos_SpringBoot, back-Ventas_SpringBoot]
    runs-on: ubuntu-latest
    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name:  Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name:  Compilar y Testear
        run: |
          cd ${{ matrix.microservice }}
          mvn clean package -B
        shell: bash

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_despacho
    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name:  Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name:  Instalar dependencias
        run: npm ci

      - name:  Build
        run: npm run build