name: Integracion Continua (CI)

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Asegúrate de que estos nombres coincidan exactamente con tus carpetas
        microservice: [back-Despachos_SpringBoot, back-Ventas_SpringBoot]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Pruebas Unitarias
        run: |
          # Entramos a la carpeta de cada microservicio según la nueva estructura
          cd backend/${{ matrix.microservice }}
          mvn clean test -Dspring.datasource.url=jdbc:h2:mem:testdb -Dspring.datasource.driverClassName=org.h2.Driver -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect -Dspring.datasource.username=sa -Dspring.datasource.password= -B